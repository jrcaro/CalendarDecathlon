# This is a basic workflow that is manually triggered

name: Copy Decathlon calendar

# Controls when the action will run. Workflow runs when manually triggered using the UI
# or API.
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # Add "id-token" with the intended permissions.
    permissions:
      contents: 'read'
      id-token: 'write'
    steps:
      - name: checkout repo content
        uses: actions/checkout@v4 # checkout the repository content

      - name: Authenticate with Google Cloud
        uses: google-github-actions/auth@v3
        with:
          service_account: 'google-calendar-sa@decathlon-github-action.iam.gserviceaccount.com'
          workload_identity_provider: 'projects/700728399497/locations/global/workloadIdentityPools/github/providers/github-provider'
          project_id: 'decathlon-github-action'

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12' # install the python version needed

      - name: Install Chrome
        run: |
          wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo mkdir -p /etc/apt/sources.list.d
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google-chrome.list'
          sudo apt-get update
          sudo apt-get -y install google-chrome-stable
      
      - name: Install ChromeDriver
        run: |
          # Using specific ChromeDriver version for Chrome I used 132
          CHROMEDRIVER_VERSION="132.0.6834.83"
          echo "Installing ChromeDriver version: $CHROMEDRIVER_VERSION"
          wget -q "https://edgedl.me.gvt1.com/edgedl/chrome/chrome-for-testing/$CHROMEDRIVER_VERSION/linux64/chromedriver-linux64.zip"
          unzip chromedriver-linux64.zip
          chmod +x chromedriver-linux64/chromedriver
          sudo mv chromedriver-linux64/chromedriver /usr/local/bin/

      - name: install python packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: execute py script # run main.py
        run: python src/main.py --user ${{ secrets.USER_NAME }} --password ${{ secrets.PASSWORD }}   --calendar-id ${{ secrets.CALENDAR_ID }} --collaborator-id ${{ secrets.COLLABORATOR_ID }} 
