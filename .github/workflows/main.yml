# This is a basic workflow that is manually triggered

name: Copy Decathlon calendar

# Controls when the action will run. Workflow runs when manually triggered using the UI
# or API.
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # Add "id-token" with the intended permissions.
    permissions:
      contents: 'read'
      id-token: 'write'
    steps:
      - name: checkout repo content
        uses: actions/checkout@v4 # checkout the repository content

      - name: Authenticate with Google Cloud
        uses: google-github-actions/auth@v3
        with:
          service_account: 'google-calendar-sa@decathlon-github-action.iam.gserviceaccount.com'
          workload_identity_provider: 'projects/700728399497/locations/global/workloadIdentityPools/github/providers/github-provider'
          project_id: 'decathlon-github-action'

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12' # install the python version needed

      - name: Install a new Chromium
        run: sudo apt install -y chromium-browser

      - name: install python packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: execute py script # run main.py
        run: python src/main.py --user ${{ secrets.USER_NAME }} --password ${{ secrets.PASSWORD }}   --calendar-id ${{ secrets.CALENDAR_ID }} --collaborator-id ${{ secrets.COLLABORATOR_ID }} 
